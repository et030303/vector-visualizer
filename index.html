<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vector Master - 벡터 시각화</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; }
        #menu { padding: 15px; display: flex; gap: 10px; background: #2a2a2a; width: 100%; justify-content: center; border-bottom: 2px solid #333; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #444; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #555; }
        button.active { background: #007bff; }
        #reset-btn { background: #dc3545; }
        #canvas-container { margin-top: 20px; border: 1px solid #444; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

<div id="menu">
    <button onclick="setMode('ADD', this)" id="btn-ADD">합 (+)</button>
    <button onclick="setMode('SUB', this)" id="btn-SUB">차 (-)</button>
    <button onclick="setMode('DOT', this)" id="btn-DOT">내적 (·)</button>
    <button onclick="resetAll()" id="reset-btn">리셋</button>
</div>

<div id="canvas-container"></div>

<script src="sketch.js"></script>

<script>
    // 버튼 UI 상태 변경 함수
    function setMode(mode, btn) {
        const buttons = document.querySelectorAll('#menu button');
        buttons.forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        
        // sketch.js에 있는 함수 호출
        if (typeof window.changeMode === 'function') {
            window.changeMode(mode);
        }
    }
</script>
</body>
</html>
