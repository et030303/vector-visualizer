<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Master | 벡터 시각화 도구</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        /* 어두운 테마와 깔끔한 레이아웃 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* 상단 버튼 메뉴바 */
        #menu {
            width: 100%;
            padding: 20px 0;
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #3d3d3d;
            transform: translateY(-2px);
        }

        button.active {
            background-color: #007bff;
            border-color: #0056b3;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        #reset-btn {
            background-color: #dc3545;
            border-color: #a71d2a;
        }

        #reset-btn:hover {
            background-color: #c82333;
        }

        /* 캔버스가 들어갈 컨테이너 */
        #canvas-container {
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden; /* 캔버스 모서리 둥글게 */
        }

        .guide-text {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="menu">
        <button onclick="changeMode('ADD', this)">벡터의 합 (+)</button>
        <button onclick="changeMode('SUB', this)">벡터의 차 (-)</button>
        <button onclick="changeMode('DOT', this)">내적 (·)</button>
        <button id="reset-btn" onclick="resetAll()">리셋 (Reset)</button>
    </div>

    <div id="canvas-container">
        </div>

    <p class="guide-text">왼쪽 칸에 벡터 2개를 드래그해서 그려보세요!</p>

    <script src="sketch.js"></script>

    <script>
        // 버튼 상태 UI 관리를 위한 간단한 함수
        function changeMode(mode, btn) {
            // 모든 버튼에서 active 클래스 제거
            const buttons = document.querySelectorAll('#menu button');
            buttons.forEach(b => b.classList.remove('active'));
            
            // 클릭한 버튼에 active 클래스 추가
            btn.classList.add('active');
            
            // sketch.js에 정의된 setMode 함수 호출
            setMode(mode);
        }
    </script>
</body>
</html>
