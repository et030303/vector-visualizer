<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벡터 마스터 - 시각화 도구</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: 'Pretendard', sans-serif; }
        #menu { padding: 15px; display: flex; gap: 10px; background: #2a2a2a; width: 100%; justify-content: center; border-bottom: 2px solid #333; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #444; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #555; }
        button.active { background: #007bff; box-shadow: 0 0 10px rgba(0,123,255,0.5); }
        #reset-btn { background: #dc3545; }
        #canvas-container { margin-top: 20px; border: 1px solid #444; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .guide { margin-top: 10px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div id="menu">
    <button onclick="setMode('ADD', this)">벡터의 합 (+)</button>
    <button onclick="setMode('SUB', this)">벡터의 차 (-)</button>
    <button onclick="setMode('DOT', this)">내적 (·)</button>
    <button onclick="resetAll()" id="reset-btn">리셋</button>
</div>

<div id="canvas-container"></div>
<p class="guide">왼쪽 칸에 벡터 2개를 그려보세요 (드래그)</p>

<script src="sketch.js"></script>
<script>
    function setMode(mode, btn) {
        const buttons = document.querySelectorAll('#menu button');
        buttons.forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        if (typeof window.changeMode === 'function') {
            window.changeMode(mode);
        }
    }
</script>
</body>
</html>
