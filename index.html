<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vector Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        #ui-panel { padding: 10px; background: #fff; width: 100%; display: flex; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: white; transition: 0.2s; }
        button:hover { background: #555; }
        canvas { box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 20px; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <button onclick="setMode('add')">합 (Addition)</button>
        <button onclick="setMode('sub')">차 (Subtraction)</button>
        <button onclick="resetCanvas()">리셋 (R)</button>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
