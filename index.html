<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vector Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        #ui-layer { padding: 15px; display: flex; gap: 10px; background: #333; width: 100%; justify-content: center; position: sticky; top: 0; z-index: 10; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #555; color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: #777; }
        button.active { background: #007bff; box-shadow: 0 0 10px rgba(0,123,255,0.5); }
        #next-btn { background: #28a745; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        canvas { margin-top: 10px; border: 1px solid #444; border-radius: 8px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <button onclick="setMode('ADD')" id="btn-ADD">합 (+)</button>
    <button onclick="setMode('SUB')" id="btn-SUB">차 (-)</button>
    <button onclick="setMode('DOT')" id="btn-DOT">내적 (·)</button>
    <button onclick="resetAll()" style="background:#dc3545;">리셋</button>
    <button id="next-btn" onclick="nextStep()">다음 단계 ➔</button>
</div>

<script src="sketch.js"></script>

</body>
</html>
